// CS2 Admin Groups Configuration
// Place this file at: <game_root>/cfg/cs2admin/admin_groups.cfg
//
// Define admin groups with flags, immunity levels, and per-group command overrides.
// Groups defined here are MERGED with database groups - if a group exists in both,
// flags are combined (additive) and immunity takes the higher value.
//
// Flag reference (same as SourceMod):
//   a - Reserved slot        b - Generic admin
//   c - Kick                 d - Ban
//   e - Unban                f - Slay
//   g - Map change           h - ConVar access
//   i - Config               j - Chat commands
//   k - Vote                 l - Password
//   m - RCON                 n - Cheats
//   o-t - Custom flags 1-6   z - Root (all access)

"Groups"
{
    // Example group:
    //
    // "Full Admins"
    // {
    //     "flags"       "z"
    //     "immunity"    "100"
    //
    //     // Optional per-group command overrides
    //     "Overrides"
    //     {
    //         "ban"     "allow"
    //         "kick"    "allow"
    //     }
    // }
    //
    // "Moderators"
    // {
    //     "flags"       "bcdej"
    //     "immunity"    "50"
    // }
}
