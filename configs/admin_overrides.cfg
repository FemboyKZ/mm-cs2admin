// CS2 Global Command Overrides
// Place this file at: <game_root>/cfg/cs2admin/admin_overrides.cfg
//
// Override the default admin flag required for specific commands.
// This changes which flag is checked BEFORE group overrides are consulted.
//
// Overrides defined here are MERGED with database overrides (sb_overrides table).
// Database overrides take priority if the same command is defined in both.
//
// Two syntax forms are supported:
//
// Simple form (one line):
//   "command_name"    "flag"
//   "@group_name"     "flag"       // prefix @ for group overrides
//
// Block form:
//   "command_name"
//   {
//       "type"    "command"        // "command" (default) or "group"
//       "flag"    "d"
//   }
//
// Flag reference (same as SourceMod):
//   a - Reserved slot        b - Generic admin
//   c - Kick                 d - Ban
//   e - Unban                f - Slay
//   g - Map change           h - ConVar access
//   i - Config               j - Chat commands
//   k - Vote                 l - Password
//   m - RCON                 n - Cheats
//   o-t - Custom flags 1-6   z - Root (all access)

"Overrides"
{
    // Examples:
    //
    // // Require ban flag to use the mute command instead of the default chat flag
    // "mute"    "d"
    //
    // // Block form example
    // "silence"
    // {
    //     "type"    "command"
    //     "flag"    "d"
    // }
}
