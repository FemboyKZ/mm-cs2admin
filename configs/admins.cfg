// CS2 Admins Configuration
// Place this file at: <game_root>/cfg/cs2admin/admins.cfg
//
// Define admins who should have permissions on this server,
// regardless of whether they have an SBPP web panel account.
//
// Admins defined here are MERGED with database admins — if a player
// exists in both, their flags and immunity are combined (additive).
//
// Flag reference (same as SourceMod):
//   a - Reserved slot        b - Generic admin
//   c - Kick                 d - Ban
//   e - Unban                f - Slay
//   g - Map change           h - ConVar access
//   i - Config               j - Chat commands
//   k - Vote                 l - Password
//   m - RCON                 n - Cheats
//   o-t - Custom flags 1-6   z - Root (all access)

"Admins"
{
