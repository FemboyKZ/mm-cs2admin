// CS2 Simple Admins File
// Place this file at: <game_root>/cfg/cs2admin/admins_simple.ini
//
// Quick-add admins without the full KeyValues admins.cfg format.
// One admin per line. Admins here are MERGED with admins.cfg and database admins.
//
// Format:
//   "STEAM_ID" "flags" "immunity"
//   "STEAM_ID" "flags"
//   "STEAM_ID" "immunity:GroupName"
//
// Flag reference (same as SourceMod):
//   a - Reserved slot        b - Generic admin
//   c - Kick                 d - Ban
//   e - Unban                f - Slay
//   g - Map change           h - ConVar access
//   i - Config               j - Chat commands
//   k - Vote                 l - Password
//   m - RCON                 n - Cheats
//   o-t - Custom flags 1-6   z - Root (all access)
//
// Examples:
//   "STEAM_0:1:12345" "z" "100"
//   "STEAM_0:0:67890" "bcd" "50"
//   "STEAM_0:1:11111" "50:Full Admins"
